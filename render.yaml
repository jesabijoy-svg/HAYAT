services:
  - type: web
    name: hayat-doc-intelligence
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Set this in your Render Dashboard secrets
      - key: APP_URL
        sync: false # Optional: Set to your custom or Render-assigned domain URL
